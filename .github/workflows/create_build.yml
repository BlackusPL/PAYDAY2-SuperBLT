name: Create SBLT Build

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}
 
jobs:
  build:
    name: Build x64 Release
    runs-on: windows-2022
 
    steps:
      - name: Checkout repo (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
 
      # windows-2022 runner już ma VS 2022 Build Tools + CMake preinstalowane,
      # więc nie trzeba ręcznie wołać vcvars64.bat - MSBuild i cmake są w PATH
      # przez "Developer Command Prompt" shell poniżej.
      - name: Configure (CMake)
        shell: cmd
        run: |
          if not exist build mkdir build
          cd build
          cmake .. -A x64 -G "Visual Studio 17 2022"
 
      - name: Build (MSBuild)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" 2>nul || call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          cd build
          msbuild SuperBLT.sln /t:Build /p:Configuration=Release /m /v:m
 
      - name: Verify output
        shell: cmd
        run: |
          dir build\Release\WSOCK32.dll
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSOCK32-dll
          path: build/Release/WSOCK32.dll
          if-no-files-found: error
 
      # - name: Create GitHub Release (on tag)
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: build/Release/WSOCK32.dll
